<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kilo Chat</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px; margin: 0 auto; padding: 20px; background: #f5f5f5;
        }
        h1 { text-align: center; color: #333; }
        .input-container { display: flex; gap: 10px; margin-bottom: 20px; }
        #prompt-input {
            flex: 1; padding: 12px; font-size: 16px;
            border: 1px solid #ddd; border-radius: 8px; resize: vertical; min-height: 60px;
        }
        #send-btn {
            padding: 12px 24px; font-size: 16px; background: #007bff; color: white;
            border: none; border-radius: 8px; cursor: pointer;
        }
        #send-btn:hover { background: #0056b3; }
        #send-btn:disabled { background: #ccc; cursor: not-allowed; }
        #response {
            background: white; padding: 20px; border-radius: 8px;
            white-space: pre-wrap; font-family: monospace; font-size: 14px;
            line-height: 1.5; min-height: 100px; border: 1px solid #ddd;
        }
        .error { color: #dc3545; background: #fff5f5; }
        .loading { color: #666; font-style: italic; }
        .api-key-note { font-size: 12px; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>🤖 Kilo Chat</h1>
    <p class="api-key-note">Enter your Kilo API key below (stored locally in browser).</p>
    
    <input type="password" id="api-key" placeholder="Enter Kilo API key" style="width:100%;padding:12px;font-size:14px;border:1px solid #ddd;border-radius:8px;margin-bottom:10px;">
    
    <div class="input-container">
        <textarea id="prompt-input" placeholder="Enter your prompt..."></textarea>
        <button id="send-btn">Send</button>
    </div>
    
    <div id="response">Response will appear here...</div>

    <script type="module">
        import { Kilo } from 'https://esm.sh/@kilocode/sdk';

        const promptInput = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const responseDiv = document.getElementById('response');
        const apiKeyInput = document.getElementById('api-key');

        // Load API key from localStorage if available
        const savedKey = localStorage.getItem('kilo-api-key');
        if (savedKey) apiKeyInput.value = savedKey;

        async function sendMessage() {
            const apiKey = apiKeyInput.value.trim();
            const prompt = promptInput.value.trim();
            
            if (!apiKey) { responseDiv.textContent = 'Error: Please enter your Kilo API key'; responseDiv.className = 'error'; return; }
            if (!prompt) { responseDiv.textContent = 'Error: Please enter a prompt'; responseDiv.className = 'error'; return; }

            localStorage.setItem('kilo-api-key', apiKey);
            sendBtn.disabled = true;
            responseDiv.textContent = 'Loading...';
            responseDiv.className = 'loading';

            try {
                const client = new Kilo({ apiKey });
                const response = await client.chat.completions.create({
                    model: 'claude-sonnet-4-6',
                    messages: [{ role: 'user', content: prompt }],
                    stream: false
                });
                responseDiv.textContent = response.choices[0]?.message?.content || 'No response';
                responseDiv.className = '';
            } catch (error) {
                responseDiv.textContent = 'Error: ' + (error.message || error.toString());
                responseDiv.className = 'error';
            } finally {
                sendBtn.disabled = false;
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        promptInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
    </script>
</body>
</html>
